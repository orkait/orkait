services:
  pinchtab:
    image: pinchtab/pinchtab
    container_name: pinchtab
    ports:
      - "127.0.0.1:9867:9867"
    volumes:
      - pinchtab-data:/data
      - /home/kai/.pinchtab-config:/config:ro
    environment:
      PINCHTAB_CONFIG: /config/config.json
      PINCHTAB_CHROME_NO_SANDBOX: "1"
      PINCHTAB_TOKEN: ${PINCHTAB_TOKEN:-}
    restart: unless-stopped
    mem_limit: 2g
    cpus: "2.0"
    shm_size: "1g"
    tmpfs:
      - /tmp:size=512m,noexec,nosuid,nodev
      - /run:size=64m,noexec,nosuid,nodev
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "pinchtab", "health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  pinchtab-data:
