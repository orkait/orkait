<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <style>
        * {
            margin: 0;
            padding: 0;
        }

        .green-square {
            background-color: green;
            width: 300px;
            height: 200px;
            position: relative;
        }

        .blue-square {
            background-color: blue;
            width: 100px;
            height: 100px;
            position: absolute;

            top: 100%;
            right: 0%;

            transform: translateX(-50%) translateY(-50%);
        }

        .test {
            border: 1px solid red;
        }
    </style>

    <div class="green-square test">
        <div class="blue-square test"></div>
    </div>


</body>

</html>
